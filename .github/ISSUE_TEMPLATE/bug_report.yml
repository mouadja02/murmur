name: Bug report
description: Something in Murmur is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! A few quick questions to help us reproduce it.

  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. Windows 11 23H2, Windows 10 22H2
      placeholder: Windows 11 23H2
    validations:
      required: true

  - type: input
    id: murmur-version
    attributes:
      label: Murmur version / commit
      description: Output of `git rev-parse HEAD` or the release tag you're on
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM provider
      options:
        - Ollama
        - LM Studio
        - llama.cpp server
        - Other OpenAI-compatible
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The more precise, the faster we can fix it.
      placeholder: |
        1. Start `pnpm dev`
        2. Hold Ctrl+Shift+Space
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt
      description: Paste anything from the `logs/<timestamp>/` folder or the terminal that looks related.
      render: shell
