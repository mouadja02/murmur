name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      # uiohook-napi and @nut-tree-fork/nut-js postinstall scripts download
      # platform-specific prebuilts and link against system X11 libs on Linux.
      # The GH Ubuntu image already has libx11 + libxtst preinstalled, but we
      # pin them here to make the dependency explicit and surface any future
      # regression immediately.
      - name: Install Linux runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libx11-6 libxtst6 libxkbcommon0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # Skip downloading Electron's Chromium; we only run static checks + tests
          # against compiled JS, we never actually launch the Electron binary in CI.
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Lint & typecheck
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
